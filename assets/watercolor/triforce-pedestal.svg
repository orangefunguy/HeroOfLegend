<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8b898"/>
      <stop offset="100%" stop-color="#8a7858"/>
    </linearGradient>
    <linearGradient id="pyramidLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a830"/>
      <stop offset="100%" stop-color="#a07820"/>
    </linearGradient>
    <linearGradient id="pyramidRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#c8a038"/>
    </linearGradient>
    <radialGradient id="slotGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#88e8ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4ae8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Stone steps -->
  <path d="M20 180 L260 180 L240 160 L40 160 Z" fill="url(#stoneGrad)" stroke="#6a5840" stroke-width="1" opacity="0.9"/>
  <path d="M40 160 L240 160 L220 145 L60 145 Z" fill="#b8a888" stroke="#6a5840" stroke-width="1" opacity="0.85"/>
  <path d="M60 145 L220 145 L200 132 L80 132 Z" fill="#c8b898" stroke="#6a5840" stroke-width="1"/>
  <!-- Moss accents -->
  <ellipse cx="50" cy="175" rx="12" ry="4" fill="#5a9e52" opacity="0.5"/>
  <ellipse cx="230" cy="172" rx="10" ry="3" fill="#4a8a42" opacity="0.4"/>
  <!-- Pedestal base -->
  <ellipse cx="140" cy="128" rx="55" ry="12" fill="#9a8868" stroke="#6a5840" stroke-width="1"/>
  <!-- 3D Triforce pyramid -->
  <path d="M140 40 L70 120 L140 120 Z" fill="url(#pyramidLeft)" stroke="#6a5020" stroke-width="1.5"/>
  <path d="M140 40 L210 120 L140 120 Z" fill="url(#pyramidRight)" stroke="#6a5020" stroke-width="1.5"/>
  <path d="M95 120 L140 75 L185 120 Z" fill="#e8c040" stroke="#8a7020" stroke-width="1.5"/>
  <!-- Apex slot glow (sword entry point) -->
  <circle cx="140" cy="52" r="18" fill="url(#slotGlow)"/>
  <path d="M132 58 L140 48 L148 58 L140 64 Z" fill="#ffe880" opacity="0.7"/>
  <!-- Floating triforce symbol -->
  <g transform="translate(140, 28)">
    <path d="M0,-12 L10,8 L-10,8 Z" fill="#f5d050" stroke="#8a7020" stroke-width="1.5"/>
    <path d="M0,-6 L5,4 L-5,4 Z" fill="#fff0a0"/>
  </g>
</svg>