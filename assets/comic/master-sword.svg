<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 320" fill="none">
  <!-- Original comic-style Master Sword -->
  <g stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- Blade -->
    <path d="M40 8 L40 200" stroke-width="4"/>
    <path d="M36 8 L44 8 L42 200 L38 200 Z" fill="#b8d4e8" stroke="#1a1a1a"/>
    <path d="M38 20 L40 180 L42 20 Z" fill="#e8f4ff" opacity="0.6"/>
    <!-- Triforce etching on blade -->
    <path d="M40 60 L44 68 L36 68 Z" fill="#e8a838" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Cross guard -->
    <path d="M22 200 L58 200 L56 212 L24 212 Z" fill="#6a8ab8"/>
    <path d="M18 204 L62 204" stroke-width="4"/>
    <!-- Grip -->
    <rect x="34" y="212" width="12" height="48" rx="2" fill="#2a4a6a"/>
    <line x1="34" y1="224" x2="46" y2="224"/>
    <line x1="34" y1="236" x2="46" y2="236"/>
    <line x1="34" y1="248" x2="46" y2="248"/>
    <!-- Pommel -->
    <circle cx="40" cy="272" r="10" fill="#e8a838"/>
    <path d="M40 264 L43 272 L37 272 Z" fill="#f5c842"/>
  </g>
  <!-- Motion highlight -->
  <path d="M44 40 L48 120" stroke="#4ae8ff" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
</svg>