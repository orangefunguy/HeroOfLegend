<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" shape-rendering="crispEdges">
  <!-- BOTW-inspired golden-hour pixel panorama (original art) -->
  <!-- Sky -->
  <rect width="320" height="180" fill="#1a2848"/>
  <rect y="0" width="320" height="60" fill="#2a4070"/>
  <rect y="20" width="320" height="50" fill="#4a6898"/>
  <rect y="40" width="320" height="40" fill="#88b8d8"/>
  <rect y="55" width="320" height="35" fill="#c8e0a8"/>
  <!-- Sun -->
  <rect x="240" y="18" width="16" height="16" fill="#ffe880"/>
  <rect x="236" y="22" width="24" height="8" fill="#ffd040" opacity="0.6"/>
  <rect x="244" y="14" width="8" height="24" fill="#ffd040" opacity="0.5"/>
  <!-- Sun rays -->
  <rect x="248" y="8" width="4" height="6" fill="#ffe880" opacity="0.7"/>
  <rect x="260" y="16" width="6" height="4" fill="#ffe880" opacity="0.5"/>
  <rect x="228" y="28" width="6" height="4" fill="#ffe880" opacity="0.5"/>
  <!-- Clouds -->
  <rect x="40" y="24" width="8" height="4" fill="#f0e8d8" opacity="0.9"/>
  <rect x="36" y="28" width="16" height="4" fill="#f0e8d8" opacity="0.8"/>
  <rect x="44" y="32" width="8" height="4" fill="#e8e0d0" opacity="0.7"/>
  <rect x="120" y="16" width="12" height="4" fill="#f8f0e0" opacity="0.85"/>
  <rect x="116" y="20" width="20" height="4" fill="#f0e8d8" opacity="0.75"/>
  <rect x="124" y="24" width="12" height="4" fill="#e8e0d0" opacity="0.65"/>
  <rect x="200" y="30" width="10" height="3" fill="#f0e8d8" opacity="0.7"/>
  <rect x="196" y="33" width="18" height="3" fill="#e8e0d0" opacity="0.6"/>
  <!-- Distant mountains -->
  <polygon points="0,90 40,55 80,75 120,45 160,70 200,40 240,65 280,50 320,80 320,90" fill="#3a5070" opacity="0.8"/>
  <polygon points="0,100 60,70 100,85 150,60 190,80 230,55 280,75 320,65 320,100" fill="#2a4060" opacity="0.9"/>
  <!-- Mist layer -->
  <rect y="82" width="320" height="12" fill="#a8c8e0" opacity="0.35"/>
  <rect y="88" width="320" height="8" fill="#c8d8e8" opacity="0.25"/>
  <!-- Hyrule Castle (distant, pink-purple BOTW tint) -->
  <rect x="148" y="58" width="24" height="22" fill="#4a3858"/>
  <rect x="154" y="48" width="12" height="12" fill="#3a2848"/>
  <rect x="156" y="40" width="8" height="10" fill="#3a2848"/>
  <rect x="158" y="34" width="4" height="8" fill="#2a1838"/>
  <rect x="140" y="64" width="8" height="14" fill="#3a2848"/>
  <rect x="172" y="64" width="8" height="14" fill="#3a2848"/>
  <rect x="136" y="70" width="6" height="8" fill="#2a1838"/>
  <rect x="178" y="70" width="6" height="8" fill="#2a1838"/>
  <rect x="160" y="66" width="4" height="4" fill="#ff8c32" opacity="0.7"/>
  <!-- Mid mountains -->
  <polygon points="0,110 50,85 90,100 140,78 180,95 220,72 270,92 320,82 320,110" fill="#2a5040"/>
  <polygon points="0,120 70,95 110,108 170,88 220,102 280,90 320,105 320,120" fill="#1e3d2e"/>
  <!-- Shrine (orange glow dot) -->
  <rect x="72" y="96" width="6" height="8" fill="#5a4030"/>
  <rect x="74" y="92" width="2" height="2" fill="#ff8c32"/>
  <!-- Tower silhouette -->
  <rect x="248" y="88" width="4" height="14" fill="#1a2838"/>
  <rect x="246" y="86" width="8" height="4" fill="#1a2838"/>
  <rect x="248" y="90" width="4" height="2" fill="#ff8c32" opacity="0.8"/>
  <!-- Ground -->
  <rect y="118" width="320" height="62" fill="#3d6b4f"/>
  <rect y="118" width="320" height="8" fill="#5a9e72"/>
  <rect y="130" width="320" height="50" fill="#2a5040"/>
  <!-- Cliff foreground (left) -->
  <polygon points="0,130 0,180 100,180 80,140 60,130 40,135 20,128" fill="#3a3a48"/>
  <polygon points="0,140 0,180 70,180 55,150 30,145" fill="#2a2a38"/>
  <!-- Grass tufts on cliff -->
  <rect x="12" y="138" width="2" height="4" fill="#5a9e72"/>
  <rect x="18" y="136" width="2" height="6" fill="#3d6b4f"/>
  <rect x="24" y="139" width="2" height="3" fill="#5a9e72"/>
  <rect x="8" y="140" width="2" height="2" fill="#e8d040"/>
  <rect x="22" y="137" width="2" height="2" fill="#e8a838"/>
  <!-- Link silhouette on cliff -->
  <rect x="28" y="118" width="6" height="4" fill="#1a3050"/>
  <rect x="26" y="122" width="10" height="8" fill="#2a4888"/>
  <rect x="28" y="130" width="3" height="6" fill="#8a7858"/>
  <rect x="33" y="130" width="3" height="6" fill="#6a5840"/>
  <rect x="24" y="124" width="3" height="8" fill="#2a4888"/>
  <rect x="36" y="120" width="2" height="10" fill="#c8c8c8"/>
  <rect x="22" y="122" width="4" height="6" fill="#8a5030"/>
  <!-- Trees -->
  <rect x="108" y="124" width="4" height="10" fill="#4a3020"/>
  <rect x="104" y="118" width="12" height="8" fill="#2a5a30"/>
  <rect x="106" y="114" width="8" height="6" fill="#3d6b4f"/>
  <rect x="190" y="126" width="3" height="8" fill="#4a3020"/>
  <rect x="187" y="120" width="9" height="8" fill="#2a5a30"/>
  <!-- Spirit orb particles -->
  <rect x="160" y="108" width="2" height="2" fill="#4ae8ff" opacity="0.8"/>
  <rect x="200" y="112" width="2" height="2" fill="#4ae8ff" opacity="0.6"/>
  <rect x="140" y="104" width="2" height="2" fill="#88e8ff" opacity="0.5"/>
</svg>