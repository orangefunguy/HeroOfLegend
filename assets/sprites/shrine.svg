<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 40" shape-rendering="crispEdges">
  <!-- BOTW shrine inspired (original) -->
  <rect x="10" y="0" width="12" height="6" fill="#8a7060"/>
  <rect x="8" y="6" width="16" height="4" fill="#6a5040"/>
  <rect x="6" y="10" width="20" height="6" fill="#8a7060"/>
  <rect x="4" y="16" width="24" height="8" fill="#5a4030"/>
  <rect x="2" y="24" width="28" height="10" fill="#4a3020"/>
  <rect x="0" y="34" width="32" height="6" fill="#3a2818"/>
  <!-- Orange shrine glow -->
  <rect x="14" y="2" width="4" height="2" fill="#ff8c32"/>
  <rect x="12" y="12" width="8" height="2" fill="#ff8c32" opacity="0.8"/>
  <rect x="10" y="20" width="12" height="2" fill="#ff6c12" opacity="0.6"/>
  <!-- Door -->
  <rect x="12" y="26" width="8" height="8" fill="#1a1428"/>
  <rect x="14" y="28" width="4" height="4" fill="#ff8c32" opacity="0.5"/>
  <!-- Side accents -->
  <rect x="6" y="14" width="2" height="2" fill="#4a9eff" opacity="0.5"/>
